<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium Sandbox Demo</title>
  <!-- Tell Cesium where its workers/assets live (must be set before Cesium.js loads) -->
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/';</script>
  <!-- Cesium from CDN (same version as the sandbox dependency) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    #xr-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      padding: 10px 18px;
      background: rgba(20,20,20,0.85);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      font: bold 15px sans-serif;
      cursor: pointer;
      display: none;
    }
    #xr-btn:hover { background: rgba(50,50,50,0.95); }
    #xr-btn.active { border-color: #4af; color: #4af; }

    #map-legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 200;
      background: rgba(18,18,18,0.88);
      color: #eee;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 12px 14px 10px;
      font: 13px/1.5 sans-serif;
      backdrop-filter: blur(6px);
      min-width: 180px;
      user-select: none;
    }
    #map-legend h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #aaa;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .legend-symbol {
      flex-shrink: 0;
      width: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .legend-dot {
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-block;
    }
    .legend-polygon {
      width: 16px;
      height: 10px;
      border: 2px solid #f44;
      background: rgba(255,68,68,0.35);
      border-radius: 2px;
    }
    .legend-label { flex: 1; font-size: 12px; }
    .legend-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.8;
      transition: opacity .15s;
    }
    .legend-toggle:hover { opacity: 1; }
    .legend-toggle.off { opacity: 0.35; }
    .legend-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 6px 0;
    }

    /* ── Fire popup panel (vertical accordion, no horizontal scrolling) ── */
    #fire-popup {
      display: none;
      position: absolute;
      left: calc(100% + 6px);
      width: 240px;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      z-index: 250;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 4px 0;
    }
    .fp-city-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px 7px 12px;
      cursor: pointer;
      color: #ddd;
      font: 12px/1.4 sans-serif;
      user-select: none;
    }
    .fp-city-head:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .fp-city-name { flex: 1; }
    .fp-city-arrow { opacity: 0.5; font-size: 9px; flex-shrink: 0; }
    #fire-sub-popup {
      display: none;
      position: absolute;
      width: 220px;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      z-index: 260;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 4px 0;
    }
    .fp-fire {
      padding: 5px 8px;
      cursor: pointer;
      color: #ccc;
      font: 11px/1.4 sans-serif;
      border-radius: 4px;
    }
    .fp-fire:hover { color: #ffaaaa; background: rgba(255,80,60,0.14); }
    .fp-fire-meta { color: #777; font-size: 10px; margin-top: 1px; }
    .fp-header {
      padding: 5px 12px 4px;
      font: bold 10px/1.4 sans-serif;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 2px;
    }

    /* ── Flight info panel ── */
    #flight-info {
      display: none;
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 10px 14px 8px;
      color: #eee;
      font: 12px/1.6 sans-serif;
      backdrop-filter: blur(6px);
      min-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.55);
    }
    #flight-info .fi-callsign {
      font: bold 14px/1.3 sans-serif;
      color: #fff;
      margin-bottom: 4px;
    }
    #flight-info .fi-row { display: flex; justify-content: space-between; gap: 16px; }
    #flight-info .fi-label { color: #888; }
    #flight-info .fi-val   { color: #eee; font-weight: 600; }
    #flight-info .fi-note  { color: #666; font-size: 10px; margin-top: 6px; }
    #flight-info .fi-close {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; color: #666; cursor: pointer; font-size: 14px;
    }
    #flight-info .fi-close:hover { color: #bbb; }

    /* ── Altitude snap controls ── */
    #altitude-snap {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    #snap-toggle-btn {
      pointer-events: all;
      padding: 6px 16px;
      background: rgba(20,20,20,0.88);
      color: #bbb;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      font: 12px/1.4 sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    #snap-toggle-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    #snap-toggle-btn.active { color: #7df; border-color: rgba(100,200,255,0.55); }
    #snap-level-bar {
      pointer-events: all;
      display: none;
      align-items: center;
      gap: 2px;
      padding: 6px 14px;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .snap-level {
      font: 11px/1.4 sans-serif;
      color: #555;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color .1s, background .1s;
    }
    .snap-level:hover { color: #aaa; }
    .snap-level.active { color: #7df; font-weight: 600; background: rgba(100,200,255,0.1); }
    .snap-sep { color: #333; font-size: 10px; margin: 0 1px; user-select: none; }

    /* ── Map Settings Panel ── */
    #map-settings {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 200;
    }
    #map-settings-toggle {
      display: block;
      margin-left: auto;
      padding: 6px 12px;
      background: rgba(18,18,18,0.88);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      font: 12px/1.4 sans-serif;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    #map-settings-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    #map-settings-toggle.open  { color: #7df; border-color: rgba(100,200,255,0.45); }
    #map-settings-panel {
      display: none;
      margin-top: 6px;
      padding: 10px 12px 12px;
      background: rgba(18,18,18,0.93);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.55);
      min-width: 160px;
    }
    .ms-title {
      font: bold 10px/1.4 sans-serif;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }
    .ms-options { display: flex; flex-direction: column; gap: 1px; }
    .ms-option {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 6px;
      color: #ccc;
      font: 12px/1.4 sans-serif;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .ms-option:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .ms-option input { accent-color: #7df; cursor: pointer; }
    .ms-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }
    .ms-key-row {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      align-items: center;
    }
    .ms-key-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ddd;
      font: 11px/1.4 sans-serif;
      padding: 4px 6px;
      min-width: 0;
    }
    .ms-key-input::placeholder { color: #555; }
    .ms-key-input:focus { outline: none; border-color: rgba(100,200,255,0.5); }
    .ms-btn {
      padding: 4px 8px;
      background: rgba(100,200,255,0.12);
      border: 1px solid rgba(100,200,255,0.3);
      border-radius: 4px;
      color: #7df;
      font: 11px/1.4 sans-serif;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ms-btn:hover { background: rgba(100,200,255,0.22); }
    .ms-btn:disabled { opacity: 0.4; cursor: default; }
    .ms-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ccc;
      font: 12px/1.4 sans-serif;
      padding: 5px 6px;
      cursor: pointer;
      margin-top: 4px;
    }
    .ms-select:focus { outline: none; border-color: rgba(100,200,255,0.5); }
    .ms-hint { font: 10px/1.4 sans-serif; color: #555; margin-top: 4px; padding: 0 4px; }
  </style>
  <script type="importmap">
{
  "imports": {
    "cesium": "./cesium-esm-shim.js"
  }
}
</script>

<script>window.FIREBASE_CONFIG = ;</script></head>
<body>
  <div id="cesiumContainer"></div>
  <button id="xr-btn">Enter VR</button>
  <div id="flight-info">
    <button class="fi-close" id="flight-info-close">✕</button>
    <div class="fi-callsign" id="fi-callsign"></div>
    <div class="fi-row"><span class="fi-label">Altitude</span><span class="fi-val" id="fi-alt"></span></div>
    <div class="fi-row"><span class="fi-label">Speed</span><span class="fi-val" id="fi-speed"></span></div>
    <div class="fi-row"><span class="fi-label">Heading</span><span class="fi-val" id="fi-heading"></span></div>
    <div class="fi-row"><span class="fi-label">Vertical</span><span class="fi-val" id="fi-vrate"></span></div>
    <div class="fi-row"><span class="fi-label">Origin</span><span class="fi-val" id="fi-country"></span></div>
    <div class="fi-note" id="fi-note"></div>
  </div>

  <div id="altitude-snap">
    <div id="snap-level-bar"></div>
    <button id="snap-toggle-btn">⇕ Altitude Snap</button>
  </div>

  <div id="map-settings">
    <button id="map-settings-toggle">⚙ Map</button>
    <div id="map-settings-panel">
      <div class="ms-title">Imagery</div>
      <div class="ms-options">
        <label class="ms-option"><input type="radio" name="ms-imagery" value="topo" checked> Topo</label>
        <label class="ms-option"><input type="radio" name="ms-imagery" value="satellite"> Satellite</label>
        <label class="ms-option"><input type="radio" name="ms-imagery" value="3d-satellite"> 3D Satellite</label>
        <label class="ms-option"><input type="radio" name="ms-imagery" value="street"> Street</label>
        <label class="ms-option"><input type="radio" name="ms-imagery" value="dark"> Dark</label>
      </div>
      <hr class="ms-divider">
      <div class="ms-title">Photorealistic 3D</div>
      <div class="ms-options">
        <label class="ms-option"><input type="checkbox" id="ms-google3d"> Google 3D Tiles</label>
      </div>
      <div id="ms-google3d-key" style="display:none">
        <div class="ms-key-row">
          <input type="password" class="ms-key-input" id="ms-google3d-input" placeholder="Google Maps API key">
          <button class="ms-btn" id="ms-google3d-load">Load</button>
        </div>
        <div class="ms-hint">Free tier · <a href="https://developers.google.com/maps/documentation/tile/get-api-key" target="_blank" style="color:#7df">Get key</a></div>
      </div>
      <hr class="ms-divider">
      <div class="ms-title">Terrain</div>
      <div class="ms-options">
        <label class="ms-option"><input type="checkbox" id="ms-elevation" checked> 3D Elevation</label>
      </div>
      <hr class="ms-divider">
      <div class="ms-title">Load Region</div>
      <select class="ms-select" id="ms-region">
        <option value="world" selected>World (no limit)</option>
        <option value="california">California</option>
        <option value="so-cal">Southern California</option>
        <option value="pacific-nw">Pacific Northwest</option>
      </select>
      <div style="margin-top:5px">
        <button class="ms-btn" id="ms-clip-view" style="width:100%">📍 Clip to Current View</button>
      </div>
    </div>
  </div>

  <div id="map-legend">
    <h3>Map Legend</h3>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:10px;height:10px;background:#ff4500;"></span></span>
      <span class="legend-label">Camera</span>
      <button class="legend-toggle" id="legend-cameras-btn" title="Toggle camera markers">&#x1F441;</button>
    </div>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:12px;height:12px;background:#ffa500;"></span></span>
      <span class="legend-label">Near fire (&lt;5 km)</span>
    </div>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:14px;height:14px;background:#ff0000;"></span></span>
      <span class="legend-label">Inside fire perimeter</span>
    </div>

    <hr class="legend-divider">

    <div class="legend-row" id="fire-legend-row">
      <span class="legend-symbol"><span class="legend-polygon"></span></span>
      <span class="legend-label">Active fire perimeter</span>
      <button class="legend-toggle" id="legend-fires-btn" title="Toggle fire overlay">&#x1F441;</button>
    </div>

    <hr class="legend-divider">

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:12px;height:12px;background:#81d4fa;border-color:#0277bd;"></span></span>
      <span class="legend-label">Aircraft</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:12px;height:12px;background:#ffcc80;border-color:#e65100;"></span></span>
      <span class="legend-label">Helicopter</span>
      <button class="legend-toggle" id="legend-flights-btn" title="Toggle live flights">&#x1F441;</button>
    </div>

    <hr class="legend-divider">

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:14px;height:14px;background:#0097A7;"></span></span>
      <span class="legend-label">Public webcam</span>
      <button class="legend-toggle" id="legend-webcams-btn" title="Toggle public webcams">&#x1F441;</button>
    </div>

    <hr class="legend-divider">
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#1565C0;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">PD</span></span>
      <span class="legend-label">Law Enforcement</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#C62828;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">FD</span></span>
      <span class="legend-label">Fire Dispatch</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#2E7D32;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">+</span></span>
      <span class="legend-label">EMS</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#E65100;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">MC</span></span>
      <span class="legend-label">Multi-Agency</span>
      <button class="legend-toggle" id="legend-radio-btn" title="Toggle radio markers">&#x1F441;</button>
    </div>
  </div>


</body>
</html>
