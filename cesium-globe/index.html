<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CesiumJS Globe - San Diego</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #cesiumContainer {
      width: 100%;
      height: 100%;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(40, 40, 40, 0.8);
      padding: 10px;
      border-radius: 5px;
      color: white;
      font-family: sans-serif;
    }
    .control-group {
      margin-bottom: 10px;
    }
    button {
      display: block;
      margin: 5px 0;
      padding: 5px 10px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background: #005a9e;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="controls">
    <div class="control-group">
      <button id="resetView">Reset View</button>
      <button id="zoomIn">Zoom In</button>
      <button id="zoomOut">Zoom Out</button>
    </div>
    <div class="control-group">
      <button id="rotateLeft">Rotate Left</button>
      <button id="rotateRight">Rotate Right</button>
      <button id="rotateUp">Rotate Up</button>
      <button id="rotateDown">Rotate Down</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
