<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CesiumJS WebXR Demo</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      vrButton: true, // Enable WebXR button
      baseLayerPicker: false,
      fullscreenButton: false,
      animation: false,
      timeline: false,
      infoBox: false,
      geocoder: false,
      homeButton: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
    });

    // Fly to a default location (San Diego)
    const sanDiego = Cesium.Cartesian3.fromDegrees(-117.1611, 32.7157, 100000);
    viewer.camera.flyTo({ destination: sanDiego, duration: 2 });
  </script>
</body>
</html>
