<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium Sandbox Demo</title>
  <!-- Cesium from CDN (same version as the sandbox dependency) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="importmap">
{
  "imports": {
    "cesium": "./cesium-esm-shim.js"
  }
}
</script>
<script type="module">
    // Import the compiled sandbox bundle (ESM)
    import { WebXRWildfireCameraSandbox } from '../dist/WebXRWildfireCameraSandbox.js';

    // Terrain: ArcGIS World Elevation 3D — Copernicus DEM, ~10–30 m global, no token required
    const terrainProvider = await Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(
      'https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer'
    );

    // Imagery: ArcGIS World Topo Map — shaded relief, land cover, roads and labels baked in.
    // Much lighter than full satellite imagery; renders well draped over 3D elevation.
    const topoLayer = Cesium.ImageryLayer.fromProviderAsync(
      Cesium.ArcGisMapServerImageryProvider.fromUrl(
        'https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer'
      )
    );

    // Initialize Cesium Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider,
      baseLayer: topoLayer,
      vrButton: true, // enables WebXR entry point
      baseLayerPicker: false,
      fullscreenButton: false,
      animation: false,
      timeline: false,
      infoBox: false,
      geocoder: false,
      homeButton: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
    });

    // Wire up the sandbox
    const sandbox = new WebXRWildfireCameraSandbox(viewer, {
      dataSource: {
        imageUrlPattern: 'https://cameras.alertcalifornia.org/public-camera-data/{id}/latest-frame.jpg'
      },
      feed: {
        proxyBase: window.location.origin,
      },
    });
    sandbox.load('https://cameras.alertcalifornia.org/public-camera-data/all_cameras-v3.json').catch(console.error);
  </script>
</body>
</html>
