<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium Sandbox Demo</title>
  <!-- Tell Cesium where its workers/assets live (must be set before Cesium.js loads) -->
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/';</script>
  <!-- Cesium from CDN (same version as the sandbox dependency) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    #xr-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      padding: 10px 18px;
      background: rgba(20,20,20,0.85);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      font: bold 15px sans-serif;
      cursor: pointer;
      display: none;
    }
    #xr-btn:hover { background: rgba(50,50,50,0.95); }
    #xr-btn.active { border-color: #4af; color: #4af; }

    #map-legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 200;
      background: rgba(18,18,18,0.88);
      color: #eee;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 12px 14px 10px;
      font: 13px/1.5 sans-serif;
      backdrop-filter: blur(6px);
      min-width: 180px;
      user-select: none;
    }
    #map-legend h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #aaa;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .legend-symbol {
      flex-shrink: 0;
      width: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .legend-dot {
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-block;
    }
    .legend-polygon {
      width: 16px;
      height: 10px;
      border: 2px solid #f44;
      background: rgba(255,68,68,0.35);
      border-radius: 2px;
    }
    .legend-label { flex: 1; font-size: 12px; }
    .legend-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.8;
      transition: opacity .15s;
    }
    .legend-toggle:hover { opacity: 1; }
    .legend-toggle.off { opacity: 0.35; }
    .legend-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 6px 0;
    }

    /* ── Fire popup panel (vertical accordion, no horizontal scrolling) ── */
    #fire-popup {
      display: none;
      position: absolute;
      left: calc(100% + 6px);
      width: 240px;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      z-index: 250;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 4px 0;
    }
    .fp-city-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px 7px 12px;
      cursor: pointer;
      color: #ddd;
      font: 12px/1.4 sans-serif;
      user-select: none;
    }
    .fp-city-head:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .fp-city-name { flex: 1; }
    .fp-city-arrow { opacity: 0.5; font-size: 9px; flex-shrink: 0; }
    #fire-sub-popup {
      display: none;
      position: absolute;
      width: 220px;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      z-index: 260;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 4px 0;
    }
    .fp-fire {
      padding: 5px 8px;
      cursor: pointer;
      color: #ccc;
      font: 11px/1.4 sans-serif;
      border-radius: 4px;
    }
    .fp-fire:hover { color: #ffaaaa; background: rgba(255,80,60,0.14); }
    .fp-fire-meta { color: #777; font-size: 10px; margin-top: 1px; }
    .fp-header {
      padding: 5px 12px 4px;
      font: bold 10px/1.4 sans-serif;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 2px;
    }

    /* ── Flight info panel ── */
    #flight-info {
      display: none;
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 10px 14px 8px;
      color: #eee;
      font: 12px/1.6 sans-serif;
      backdrop-filter: blur(6px);
      min-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.55);
    }
    #flight-info .fi-callsign {
      font: bold 14px/1.3 sans-serif;
      color: #fff;
      margin-bottom: 4px;
    }
    #flight-info .fi-row { display: flex; justify-content: space-between; gap: 16px; }
    #flight-info .fi-label { color: #888; }
    #flight-info .fi-val   { color: #eee; font-weight: 600; }
    #flight-info .fi-note  { color: #666; font-size: 10px; margin-top: 6px; }
    #flight-info .fi-close {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; color: #666; cursor: pointer; font-size: 14px;
    }
    #flight-info .fi-close:hover { color: #bbb; }

    /* ── Altitude snap controls ── */
    #altitude-snap {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    #snap-toggle-btn {
      pointer-events: all;
      padding: 6px 16px;
      background: rgba(20,20,20,0.88);
      color: #bbb;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      font: 12px/1.4 sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    #snap-toggle-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    #snap-toggle-btn.active { color: #7df; border-color: rgba(100,200,255,0.55); }
    #snap-level-bar {
      pointer-events: all;
      display: none;
      align-items: center;
      gap: 2px;
      padding: 6px 14px;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .snap-level {
      font: 11px/1.4 sans-serif;
      color: #555;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color .1s, background .1s;
    }
    .snap-level:hover { color: #aaa; }
    .snap-level.active { color: #7df; font-weight: 600; background: rgba(100,200,255,0.1); }
    .snap-sep { color: #333; font-size: 10px; margin: 0 1px; user-select: none; }

    /* ── Map Settings Panel ── */
    #map-settings {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 200;
    }
    #map-settings-toggle {
      display: block;
      margin-left: auto;
      padding: 6px 12px;
      background: rgba(18,18,18,0.88);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      font: 12px/1.4 sans-serif;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    #map-settings-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    #map-settings-toggle.open  { color: #7df; border-color: rgba(100,200,255,0.45); }
    #map-settings-panel {
      display: none;
      margin-top: 6px;
      padding: 10px 12px 12px;
      background: rgba(18,18,18,0.93);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.55);
      min-width: 160px;
    }
    .ms-title {
      font: bold 10px/1.4 sans-serif;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }
    .ms-options { display: flex; flex-direction: column; gap: 1px; }
    .ms-option {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 6px;
      color: #ccc;
      font: 12px/1.4 sans-serif;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .ms-option:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .ms-option input { accent-color: #7df; cursor: pointer; }
    .ms-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }
    .ms-key-row {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      align-items: center;
    }
    .ms-key-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ddd;
      font: 11px/1.4 sans-serif;
      padding: 4px 6px;
      min-width: 0;
    }
    .ms-key-input::placeholder { color: #555; }
    .ms-key-input:focus { outline: none; border-color: rgba(100,200,255,0.5); }
    .ms-btn {
      padding: 4px 8px;
      background: rgba(100,200,255,0.12);
      border: 1px solid rgba(100,200,255,0.3);
      border-radius: 4px;
      color: #7df;
      font: 11px/1.4 sans-serif;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ms-btn:hover { background: rgba(100,200,255,0.22); }
    .ms-btn:disabled { opacity: 0.4; cursor: default; }
    .ms-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ccc;
      font: 12px/1.4 sans-serif;
      padding: 5px 6px;
      cursor: pointer;
      margin-top: 4px;
    }
    .ms-select:focus { outline: none; border-color: rgba(100,200,255,0.5); }
    .ms-hint { font: 10px/1.4 sans-serif; color: #555; margin-top: 4px; padding: 0 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <button id="xr-btn">Enter VR</button>
  <div id="flight-info">
    <button class="fi-close" id="flight-info-close">✕</button>
    <div class="fi-callsign" id="fi-callsign"></div>
    <div class="fi-row"><span class="fi-label">Altitude</span><span class="fi-val" id="fi-alt"></span></div>

      <div style="margin-top:5px">
        <button class="ms-btn" id="ms-clip-view" style="width:100%">📍 Clip to Current View</button>
      </div>
    </div>
  </div>

  <div id="map-legend">
    <h3>Map Legend</h3>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:10px;height:10px;background:#ff4500;"></span></span>
      <span class="legend-label">Camera</span>
      <button class="legend-toggle" id="legend-cameras-btn" title="Toggle camera markers">&#x1F441;</button>
    </div>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:12px;height:12px;background:#ffa500;"></span></span>
      <span class="legend-label">Near fire (&lt;5 km)</span>

    <div class="legend-row">

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:14px;height:14px;background:#0097A7;"></span></span>
      <span class="legend-label">Public webcam</span>
      <button class="legend-toggle" id="legend-webcams-btn" title="Toggle public webcams">&#x1F441;</button>

    <hr class="legend-divider">
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#1565C0;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">PD</span></span>

  <script type="importmap">
{
  "imports": {
    "cesium": "./cesium-esm-shim.js"
  }
}
</script>
<script type="module">
    import { WebXRWildfireCameraSandbox } from '../dist/WebXRWildfireCameraSandbox.js';
    import { WebXRCesiumBridge } from './webxr-bridge.js';
    import { EmergencyRadioDataSource, EmergencyRadioMarkerManager, EmergencyRadioPlayer } from '../dist/index.js';
    import { PublicWebcamDataSource, PublicWebcamMarkerManager, PublicWebcamViewer } from '../dist/index.js';
    import { LiveFlightDataSource, LiveFlightMarkerManager } from '../dist/index.js';

    const terrainProvider = await Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(
      'https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer'
    );

    const topoLayer = Cesium.ImageryLayer.fromProviderAsync(
      Cesium.ArcGisMapServerImageryProvider.fromUrl(
        'https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer'
      )
    );

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider,
      baseLayer: topoLayer,
      vrButton: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      animation: false,
      timeline: false,
      infoBox: false,
      geocoder: false,
      homeButton: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
    });

    // Prevent gimbal-lock at exactly -90° pitch (straight down): at that angle
    // Cesium continuously corrects the undefined heading, which fires camera.changed
    // on every frame and prevents the debounce from ever settling.
    viewer.scene.screenSpaceCameraController.minimumPitchAngle = -Cesium.Math.toRadians(89.99);

    const sandbox = new WebXRWildfireCameraSandbox(viewer, {
      dataSource: {
        imageUrlPattern: 'https://cameras.alertcalifornia.org/public-camera-data/{id}/latest-frame.jpg'
      },
      fireOverlay: {
        proximityThresholdKm: 5,
        refreshIntervalMs: 300_000,
        showToggleButton: false,
      },
    });

    sandbox.load('https://cameras.alertcalifornia.org/public-camera-data/all_cameras-v3.json')
      .then(async cameras => {
        const overlay = sandbox.fireOverlay;
        if (!overlay || overlay.incidents.length === 0) return;
        console.info(`[FireOverlay] ${overlay.incidents.length} active fire incident(s) loaded`);
        await enrichAndBuildFireMenu([...overlay.incidents]);
      })
      .catch(console.error);

    // Emergency Radio — feed list from scripts/fetch-broadcastify.mjs (511 CA feeds)
    const radioSource = new EmergencyRadioDataSource({
      feedsUrl: './data/radio-feeds.json',
      // apiKey: 'YOUR_BROADCASTIFY_API_KEY', // get free key at broadcastify.com/api
    });
    const radioPlayer = new EmergencyRadioPlayer(viewer.container);
    const radioMarkers = new EmergencyRadioMarkerManager(viewer, {
      onSelect: (feed) => radioPlayer.open(feed),
    });
    radioSource.load()
      .then(feeds => {
        radioMarkers.setFeeds(feeds);
        console.info(`[Radio] ${feeds.length} emergency radio feeds loaded`);
      })
      .catch(console.error);

    // ── Fire cascade menu ─────────────────────────────────────────────────
    function flyToBBox(bbox, pad = 0.05) {
      viewer.camera.flyTo({
        destination: Cesium.Rectangle.fromDegrees(
          bbox.west  - pad,
          bbox.south - pad,
          bbox.east  + pad,
          bbox.north + pad,
        ),
        duration: 1.5,
      });
    }

    function toTitleCase(str) {
      return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }

    /** Pull the best city/locality name from a BigDataCloud reverse-geocode result. */
    function extractCity(d) {
      if (!d) return null;
      if (d.city) return d.city;
      if (d.locality) return d.locality;
      // Walk admin hierarchy from most-specific; strip trailing "County"
      const admins = (d.localityInfo?.administrative ?? [])
        .filter(a => a.adminLevel >= 5 && a.adminLevel <= 8)
        .sort((a, b) => b.adminLevel - a.adminLevel);
      return admins[0]?.name?.replace(/\s+County$/i, '') ?? null;
    }

    /**
     * Reverse-geocodes every incident's bounding-box centre via BigDataCloud
     * (free, no key, CORS-enabled) then calls buildFireMenu with the results.
     * Incidents that already have a county field skip the API call.
     */
    async function enrichAndBuildFireMenu(incidents) {
      const cityMap = new Map();
      await Promise.all(incidents.map(async (inc) => {
        if (inc.county) { cityMap.set(inc.id, toTitleCase(inc.county)); return; }
        const lat = (inc.boundingBox.north + inc.boundingBox.south) / 2;
        const lon = (inc.boundingBox.east  + inc.boundingBox.west)  / 2;
        try {
          const r = await fetch(
            `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`
          );
          if (!r.ok) return;
          const city = extractCity(await r.json());
          if (city) cityMap.set(inc.id, city);
        } catch {}
      }));
      buildFireMenu(incidents, cityMap);
    }

    function makeFireItem(fire) {
      const item = document.createElement('div');
      item.className = 'fp-fire';
      const nameLine = document.createElement('div');
      nameLine.textContent = toTitleCase(fire.name);
      item.append(nameLine);
      const parts = [];
      if (fire.acresBurned      != null) parts.push(`${Math.round(fire.acresBurned).toLocaleString()} ac`);
      if (fire.percentContained != null) parts.push(`${fire.percentContained}% contained`);
      if (parts.length) {
        const meta = document.createElement('div');
        meta.className = 'fp-fire-meta';
        meta.textContent = parts.join(' · ');
        item.append(meta);
      }
      item.addEventListener('click', (e) => { e.stopPropagation(); flyToBBox(fire.boundingBox); });
      return item;
    }

    function buildFireMenu(incidents, cityMap) {
      const legend = document.getElementById('map-legend');
      if (!legend) return;
      document.getElementById('fire-popup')?.remove();
      document.getElementById('fire-sub-popup')?.remove();
      if (!incidents || incidents.length === 0) return;

      const popup = document.createElement('div');
      popup.id = 'fire-popup';
      const subPopup = document.createElement('div');
      subPopup.id = 'fire-sub-popup';
      legend.append(popup, subPopup);

      const popupHeader = document.createElement('div');
      popupHeader.className = 'fp-header';
      popupHeader.textContent = 'City / County';
      popup.append(popupHeader);

      // Group by resolved city name
      const groupMap = new Map();
      for (const inc of incidents) {
        const city = cityMap?.get(inc.id) ?? null;
        if (!city) continue;
        if (!groupMap.has(city)) groupMap.set(city, []);
        groupMap.get(city).push(inc);
      }

      // ── Shared timers ────────────────────────────────────────────────────
      let mainTimer, subTimer;
      const cancelMain = () => clearTimeout(mainTimer);
      const cancelSub  = () => clearTimeout(subTimer);
      const scheduleMain = () => {
        mainTimer = setTimeout(() => { popup.style.display = 'none'; subPopup.style.display = 'none'; }, 150);
      };
      const scheduleSub = () => {
        subTimer = setTimeout(() => { subPopup.style.display = 'none'; }, 150);
      };

      // ── City items ───────────────────────────────────────────────────────
      if (groupMap.size > 0) {
        for (const [city, fires] of [...groupMap.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
          const head = document.createElement('div');
          head.className = 'fp-city-head';
          const nameSpan = document.createElement('span');
          nameSpan.className = 'fp-city-name';
          nameSpan.textContent = fires.length > 1 ? `${city} (${fires.length})` : city;
          const arrow = document.createElement('span');
          arrow.className = 'fp-city-arrow';
          arrow.textContent = '›';
          head.append(nameSpan, arrow);

          head.addEventListener('click', (e) => {
            e.stopPropagation();
            flyToBBox({
              west:  Math.min(...fires.map(f => f.boundingBox.west)),
              south: Math.min(...fires.map(f => f.boundingBox.south)),
              east:  Math.max(...fires.map(f => f.boundingBox.east)),
              north: Math.max(...fires.map(f => f.boundingBox.north)),
            });
          });

          head.addEventListener('mouseenter', () => {
            cancelSub(); cancelMain();
            // Position sub-popup flush against the right edge of popup, top-aligned with this city head
            const headRect   = head.getBoundingClientRect();
            const legendRect = legend.getBoundingClientRect();
            const popupRect  = popup.getBoundingClientRect();
            const idealTop   = headRect.top - legendRect.top;
            subPopup.style.left   = (popupRect.right - legendRect.left) + 'px'; // zero gap for easy traversal
            subPopup.style.top    = Math.max(0, idealTop) + 'px';
            subPopup.style.bottom = 'auto';
            subPopup.innerHTML = '';
            const subHeader = document.createElement('div');
            subHeader.className = 'fp-header';
            subHeader.textContent = 'Fires';
            subPopup.append(subHeader);
            [...fires].sort((a, b) => a.name.localeCompare(b.name)).forEach(f => subPopup.append(makeFireItem(f)));
            subPopup.style.display = 'block';
            // Clamp bottom so sub-popup doesn't overflow viewport
            const subRect    = subPopup.getBoundingClientRect();
            const overflow   = subRect.bottom - (window.innerHeight - 8);
            if (overflow > 0) subPopup.style.top = Math.max(0, idealTop - overflow) + 'px';
          });

          popup.append(head);
        }
      } else {
        // Geocoding returned nothing — flat list
        [...incidents].sort((a, b) => a.name.localeCompare(b.name)).forEach(f => popup.append(makeFireItem(f)));
      }

      // Sub-popup stays open while mouse is anywhere in popup or sub-popup
      popup.addEventListener('mouseleave', scheduleSub);
      popup.addEventListener('mouseenter', cancelSub);
      subPopup.addEventListener('mouseenter', () => { cancelSub(); cancelMain(); });
      subPopup.addEventListener('mouseleave', scheduleSub);

      // ── Main popup hover management ──────────────────────────────────────
      const fireRow = document.getElementById('fire-legend-row');
      const hoverZone = [fireRow?.querySelector('.legend-symbol'), fireRow?.querySelector('.legend-label')];
      hoverZone.forEach(el => {
        el?.addEventListener('mouseenter', () => {
          cancelMain();
          const rowRect    = fireRow.getBoundingClientRect();
          const legendRect = legend.getBoundingClientRect();
          const idealTop   = rowRect.top - legendRect.top;
          popup.style.top    = Math.max(0, idealTop) + 'px';
          popup.style.bottom = 'auto';
          popup.style.display = 'block';
          // Clamp bottom to viewport
          const popupRect  = popup.getBoundingClientRect();
          const overflow   = popupRect.bottom - (window.innerHeight - 8);
          if (overflow > 0) popup.style.top = Math.max(0, idealTop - overflow) + 'px';
        });
        el?.addEventListener('mouseleave', scheduleMain);
      });
      popup.addEventListener('mouseenter', cancelMain);
      popup.addEventListener('mouseleave', scheduleMain);
      subPopup.addEventListener('mouseenter', cancelMain); // keep main open while browsing fires
    }
    // ─────────────────────────────────────────────────────────────────────────

    // Legend toggle — cameras
    const camerasBtn = document.getElementById('legend-cameras-btn');
    camerasBtn.addEventListener('click', () => {
      const markers = sandbox.markers;
      markers.setVisible(!markers.visible);
      camerasBtn.classList.toggle('off', !markers.visible);
    });

    // Legend toggle — fire overlay
    const firesBtn = document.getElementById('legend-fires-btn');
    firesBtn.addEventListener('click', () => {
      const overlay = sandbox.fireOverlay;
      if (!overlay) return;
      overlay.setVisible(!overlay.visible);
      firesBtn.classList.toggle('off', !overlay.visible);
    });

    // Public Webcams
    const webcamSource = new PublicWebcamDataSource({
      // apiKey: 'YOUR_WINDY_API_KEY', // free at windy.com/webcams/api
    });
    const webcamViewer  = new PublicWebcamViewer(viewer.container);
    const webcamMarkers = new PublicWebcamMarkerManager(viewer, {
      onSelect: (webcam) => webcamViewer.open(webcam),
    });
    webcamSource.load()
      .then(webcams => {
        webcamMarkers.setWebcams(webcams);
        console.info(`[Webcams] ${webcams.length} public webcams loaded`);
      })
      .catch(console.error);

    // ── Live Flights ─────────────────────────────────────────────────────────
    const flightSource  = new LiveFlightDataSource({ refreshIntervalMs: 15_000 });
    const flightMarkers = new LiveFlightMarkerManager(viewer, {
      onSelect: (flight) => {
        const panel = document.getElementById('flight-info');
        if (!flight) { panel.style.display = 'none'; return; }
        document.getElementById('fi-callsign').textContent =
          flight.callsign + (flight.kind === 'helicopter' ? ' 🚁' : ' ✈');
        document.getElementById('fi-alt').textContent =
          flight.altitude > 0 ? Math.round(flight.altitude * 3.28084).toLocaleString() + ' ft' : '—';
        document.getElementById('fi-speed').textContent =
          Math.round(flight.speed * 1.94384) + ' kn';
        document.getElementById('fi-heading').textContent =
          Math.round(flight.heading) + '°';
        document.getElementById('fi-vrate').textContent = (() => {
          const fpm = Math.round(flight.verticalRate * 196.85);
          return fpm === 0 ? 'Level' : (fpm > 0 ? '+' : '') + fpm.toLocaleString() + ' ft/min';
        })();
        document.getElementById('fi-country').textContent = flight.originCountry || '—';
        const pts = flightSource.getTrack(flight.icao24).length;
        document.getElementById('fi-note').textContent =
          pts > 1
            ? `Track: ${pts} pts · collected since page load`
            : 'Track: accumulating — check back soon';
        panel.style.display = 'block';
      },
    });
    flightMarkers.setTrackProvider(icao24 => flightSource.getTrack(icao24));
    flightSource.onUpdate = flights => flightMarkers.update(flights);
    flightSource.start().then(() => {
      console.info('[LiveFlight] started — polling adsb.fi every 15 s');
    }).catch(console.error);

    document.getElementById('flight-info-close').addEventListener('click', () => {
      document.getElementById('flight-info').style.display = 'none';
    });

    // Legend toggle — flights
    const flightsBtn = document.getElementById('legend-flights-btn');
    flightsBtn.addEventListener('click', () => {
      flightMarkers.setVisible(!flightMarkers.visible);
      flightsBtn.classList.toggle('off', !flightMarkers.visible);
    });
    // ─────────────────────────────────────────────────────────────────────────

    // Legend toggle — webcams
    const webcamsBtn = document.getElementById('legend-webcams-btn');
    webcamsBtn.addEventListener('click', () => {
      webcamMarkers.setVisible(!webcamMarkers.visible);
      webcamsBtn.classList.toggle('off', !webcamMarkers.visible);
    });

    // Legend toggle — radio markers
    const radioBtn = document.getElementById('legend-radio-btn');
    radioBtn.addEventListener('click', () => {
      radioMarkers.setVisible(!radioMarkers.visible);
      radioBtn.classList.toggle('off', !radioMarkers.visible);
    });

    // Show the VR button only on devices that support immersive-vr
    const xrBtn = document.getElementById('xr-btn');
    const bridge = new WebXRCesiumBridge(viewer);

    WebXRCesiumBridge.isSupported().then(supported => {
      if (supported) xrBtn.style.display = 'block';
    });

    xrBtn.addEventListener('click', async () => {
      if (bridge.isActive) {
        await bridge.exit();
      } else {
        try {
          await bridge.enter();
          xrBtn.textContent = 'Exit VR';
          xrBtn.classList.add('active');
        } catch (err) {
          console.error('WebXR error:', err);
          alert('Could not enter VR: ' + err.message);
        }
      }
    });

    // Restore button when the session ends (including from the headset side)
    bridge.addEventListener('sessionend', () => {
      xrBtn.textContent = 'Enter VR';
      xrBtn.classList.remove('active');
    });

    // ── Altitude Snap Scroll ──────────────────────────────────────────────
    const SNAP_LEVELS = [
      { name: 'Globe',        altitude: 10_000_000 },
      { name: 'Region',       altitude:  1_500_000 },
      { name: 'State',        altitude:    500_000 },
      { name: 'City',         altitude:     50_000 },
      { name: 'Area',         altitude:      5_000 },
      { name: 'Neighborhood', altitude:        300 },
    ];

    let snapActive  = false;
    let isSnapping  = false;

    const snapToggleBtn = document.getElementById('snap-toggle-btn');
    const snapLevelBar  = document.getElementById('snap-level-bar');

    // Build the breadcrumb bar once
    const levelSpans = SNAP_LEVELS.map((level, i) => {
      const span = document.createElement('span');
      span.className = 'snap-level';
      span.textContent = level.name;
      span.addEventListener('click', () => flyToSnapLevel(i));
      snapLevelBar.append(span);
      if (i < SNAP_LEVELS.length - 1) {
        const sep = document.createElement('span');
        sep.className = 'snap-sep';
        sep.textContent = '›';
        snapLevelBar.append(sep);
      }
      return span;
    });

    function getCurrentSnapIdx() {
      const h = viewer.camera.positionCartographic.height;
      let best = 0, bestDist = Infinity;
      SNAP_LEVELS.forEach((lvl, i) => {
        const d = Math.abs(Math.log10(lvl.altitude) - Math.log10(h));
        if (d < bestDist) { bestDist = d; best = i; }
      });
      return best;
    }

    function updateLevelBar(idx) {
      levelSpans.forEach((span, i) => span.classList.toggle('active', i === idx));
    }

    function flyToSnapLevel(idx, destLon, destLat) {
      if (isSnapping) return;
      isSnapping = true;
      updateLevelBar(idx);
      const lvl = SNAP_LEVELS[idx];
      const cam = viewer.camera;
      const pos = cam.positionCartographic;
      const lon = destLon ?? pos.longitude;
      const lat = destLat ?? pos.latitude;
      cam.flyTo({
        destination: Cesium.Cartesian3.fromRadians(lon, lat, lvl.altitude),
        orientation: { heading: cam.heading, pitch: cam.pitch, roll: cam.roll },
        duration: 0.6,
        complete: () => { isSnapping = false; },
        cancel:   () => { isSnapping = false; },
      });
    }

    function getNextSnapIdx(direction) {
      const h = viewer.camera.positionCartographic.height;
      if (direction > 0) {
        // scroll down → zoom in → lower altitude → higher index
        for (let i = 0; i < SNAP_LEVELS.length; i++) {
          if (SNAP_LEVELS[i].altitude < h * 0.75) return i;
        }
        return SNAP_LEVELS.length - 1;
      } else {
        // scroll up → zoom out → higher altitude → lower index
        for (let i = SNAP_LEVELS.length - 1; i >= 0; i--) {
          if (SNAP_LEVELS[i].altitude > h * 1.33) return i;
        }
        return 0;
      }
    }

    function setSnapActive(active) {
      snapActive = active;
      viewer.scene.screenSpaceCameraController.enableZoom = !active;
      snapToggleBtn.textContent = active ? '✕ Exit Snap' : '⇕ Altitude Snap';
      snapToggleBtn.classList.toggle('active', active);
      snapLevelBar.style.display = active ? 'flex' : 'none';
      if (active) updateLevelBar(getCurrentSnapIdx());
    }

    snapToggleBtn.addEventListener('click', () => setSnapActive(!snapActive));
    setSnapActive(true); // start in snap mode by default

    viewer.scene.canvas.addEventListener('wheel', (e) => {
      if (!snapActive) return;
      e.preventDefault();
      e.stopPropagation();

      // Pick the globe surface under the mouse cursor so the snap flies
      // toward where the user is pointing rather than the camera center.
      // Touch pinch doesn't produce wheel events so touch is unaffected.
      const rect = viewer.scene.canvas.getBoundingClientRect();
      const canvasPos = new Cesium.Cartesian2(e.clientX - rect.left, e.clientY - rect.top);
      const ray = viewer.camera.getPickRay(canvasPos);
      const hit = viewer.scene.globe.pick(ray, viewer.scene)
               ?? viewer.camera.pickEllipsoid(canvasPos); // fallback: smooth ellipsoid

      let destLon, destLat;
      if (hit) {
        const carto = Cesium.Cartographic.fromCartesian(hit);
        destLon = carto.longitude;
        destLat = carto.latitude;
      }

      // deltaY > 0 = scroll down = zoom out (higher altitude), matches Cesium free mode
      flyToSnapLevel(getNextSnapIdx(e.deltaY > 0 ? -1 : 1), destLon, destLat);
    }, { passive: false, capture: true });
    // ─────────────────────────────────────────────────────────────────────

    // ── Map Settings Panel ────────────────────────────────────────────────
    const mapSettingsToggle = document.getElementById('map-settings-toggle');
    const mapSettingsPanel  = document.getElementById('map-settings-panel');

    mapSettingsToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = mapSettingsPanel.style.display !== 'block';
      mapSettingsPanel.style.display = open ? 'block' : 'none';
      mapSettingsToggle.classList.toggle('open', open);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#map-settings')) {
        mapSettingsPanel.style.display = 'none';
        mapSettingsToggle.classList.remove('open');
      }
    });

    const ELEVATION_TERRAIN_URL =
      'https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer';

    // ── Imagery ─────────────────────────────────────────────────────────

    function createImageryLayer(type) {
      switch (type) {
        case 'satellite':
        case '3d-satellite':
          return Cesium.ImageryLayer.fromProviderAsync(
            Cesium.ArcGisMapServerImageryProvider.fromUrl(
              'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            )
          );
        case 'street':
          return Cesium.ImageryLayer.fromProviderAsync(
            Promise.resolve(new Cesium.UrlTemplateImageryProvider({
              url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
              credit: '© OpenStreetMap contributors',
            }))
          );
        case 'dark':
          return Cesium.ImageryLayer.fromProviderAsync(
            Cesium.ArcGisMapServerImageryProvider.fromUrl(
              'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer'
            )
          );
        default: // topo
          return Cesium.ImageryLayer.fromProviderAsync(
            Cesium.ArcGisMapServerImageryProvider.fromUrl(
              'https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer'
            )
          );
      }
    }

    const elevationCheckbox = document.getElementById('ms-elevation');

    document.querySelectorAll('input[name="ms-imagery"]').forEach(radio => {
      radio.addEventListener('change', () => {
        if (!radio.checked) return;
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.add(createImageryLayer(radio.value));
        // 3D Satellite preset: auto-enable elevation for the full 3D effect
        if (radio.value === '3d-satellite' && !elevationCheckbox.checked) {
          elevationCheckbox.checked = true;
          elevationCheckbox.dispatchEvent(new Event('change'));
        }
      });
    });

    // ── Elevation ────────────────────────────────────────────────────────

    elevationCheckbox.addEventListener('change', async () => {
      if (elevationCheckbox.checked) {
        viewer.terrainProvider =
          await Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(ELEVATION_TERRAIN_URL);
      } else {
        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
      }
    });

    // ── Google Photorealistic 3D Tiles ──────────────────────────────────

    let googleTileset = null;
    const google3dCheckbox = document.getElementById('ms-google3d');
    const google3dKeyRow   = document.getElementById('ms-google3d-key');
    const google3dInput    = document.getElementById('ms-google3d-input');
    const google3dLoadBtn  = document.getElementById('ms-google3d-load');

    // Restore saved key
    const savedGoogleKey = localStorage.getItem('ms-google3d-key');
    if (savedGoogleKey) google3dInput.value = savedGoogleKey;

    google3dCheckbox.addEventListener('change', () => {
      google3dKeyRow.style.display = google3dCheckbox.checked ? 'block' : 'none';
      if (!google3dCheckbox.checked) unloadGoogleTiles();
    });

    google3dLoadBtn.addEventListener('click', async () => {
      const key = google3dInput.value.trim();
      if (!key) return;
      localStorage.setItem('ms-google3d-key', key);
      google3dLoadBtn.disabled = true;
      google3dLoadBtn.textContent = '…';
      try {
        await loadGoogleTiles(key);
      } catch (err) {
        console.warn('[Map] Google 3D tiles failed:', err.message);
        alert('Could not load Google 3D tiles: ' + err.message);
        google3dCheckbox.checked = false;
        google3dKeyRow.style.display = 'none';
        unloadGoogleTiles();
      } finally {
        google3dLoadBtn.disabled = false;
        google3dLoadBtn.textContent = 'Load';
      }
    });

    async function loadGoogleTiles(apiKey) {
      unloadGoogleTiles();
      googleTileset = await Cesium.Cesium3DTileset.fromUrl(
        `https://tile.googleapis.com/v1/3dtiles/root.json?key=${encodeURIComponent(apiKey)}`
      );
      viewer.scene.primitives.add(googleTileset);
      viewer.scene.globe.show = false;
    }

    function unloadGoogleTiles() {
      if (googleTileset) {
        viewer.scene.primitives.remove(googleTileset);
        googleTileset = null;
        viewer.scene.globe.show = true;
      }
    }

    // ── Region (cartographicLimitRectangle) ──────────────────────────────

    const REGIONS = {
      'world':       null,
      'california':  Cesium.Rectangle.fromDegrees(-124.48, 32.53, -114.13, 42.01),
      'so-cal':      Cesium.Rectangle.fromDegrees(-120.5,  32.5,  -114.1,  35.8),
      'pacific-nw':  Cesium.Rectangle.fromDegrees(-124.85, 42.0,  -116.5,  49.0),
    };

    function applyRegion(rect) {
      viewer.scene.globe.cartographicLimitRectangle =
        rect ?? Cesium.Rectangle.MAX_VALUE;
    }

    const regionSelect = document.getElementById('ms-region');
    regionSelect.addEventListener('change', () => {
      applyRegion(REGIONS[regionSelect.value] ?? null);
    });

    // Apply the default selection (California) on load
    applyRegion(REGIONS[regionSelect.value] ?? null);

    document.getElementById('ms-clip-view').addEventListener('click', () => {
      const rect = viewer.camera.computeViewRectangle(viewer.scene.globe.ellipsoid);
      if (rect) {
        viewer.scene.globe.cartographicLimitRectangle = rect;
        // Add a "Custom" option if not already present, then select it
        let customOpt = regionSelect.querySelector('option[value="custom"]');
        if (!customOpt) {
          customOpt = document.createElement('option');
          customOpt.value = 'custom';
          customOpt.textContent = 'Custom (current view)';
          regionSelect.append(customOpt);
        }
        regionSelect.value = 'custom';
      }
    });
    // ─────────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
