<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium Sandbox Demo</title>
  <!-- Tell Cesium where its workers/assets live (must be set before Cesium.js loads) -->
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/';</script>
  <!-- Cesium from CDN (same version as the sandbox dependency) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    #xr-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      padding: 10px 18px;
      background: rgba(20,20,20,0.85);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      font: bold 15px sans-serif;
      cursor: pointer;
      display: none;
    }
    #xr-btn:hover { background: rgba(50,50,50,0.95); }
    #xr-btn.active { border-color: #4af; color: #4af; }

    #map-legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 200;
      background: rgba(18,18,18,0.88);
      color: #eee;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 12px 14px 10px;
      font: 13px/1.5 sans-serif;
      backdrop-filter: blur(6px);
      min-width: 180px;
      user-select: none;
    }
    #map-legend h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #aaa;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .legend-symbol {
      flex-shrink: 0;
      width: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .legend-dot {
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-block;
    }
    .legend-polygon {
      width: 16px;
      height: 10px;
      border: 2px solid #f44;
      background: rgba(255,68,68,0.35);
      border-radius: 2px;
    }
    .legend-label { flex: 1; font-size: 12px; }
    .legend-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      opacity: 0.8;
      transition: opacity .15s;
    }
    .legend-toggle:hover { opacity: 1; }
    .legend-toggle.off { opacity: 0.35; }
    .legend-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 6px 0;
    }

    /* ── Fire cascade menu ──────────────────────────────────────── */
    #fire-legend-row { position: relative; }

    .fire-cascade {
      display: none;
      position: absolute;
      left: calc(100% + 6px);
      bottom: -4px;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 7px;
      min-width: 210px;
      max-height: 55vh;
      overflow-y: auto;
      z-index: 250;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      padding: 4px 0;
    }
    .fire-county-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px 6px 12px;
      cursor: pointer;
      color: #ddd;
      font: 12px/1.4 sans-serif;
      border-radius: 4px;
      margin: 1px 4px;
    }
    .fire-county-item:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .fire-county-arrow { opacity: 0.45; font-size: 11px; margin-left: auto; flex-shrink: 0; }

    .fire-incidents {
      display: none;
      position: absolute;
      left: calc(100% + 4px);
      top: -4px;
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 7px;
      min-width: 220px;
      max-height: 50vh;
      overflow-y: auto;
      z-index: 251;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      padding: 4px 0;
    }
    .fire-county-item:hover > .fire-incidents { display: block; }

    .fire-incident-item {
      padding: 6px 14px;
      cursor: pointer;
      color: #ddd;
      font: 12px/1.4 sans-serif;
      border-radius: 4px;
      margin: 1px 4px;
    }
    .fire-incident-item:hover { background: rgba(255,80,60,0.18); color: #ffaaaa; }
    .fire-incident-meta { color: #888; font-size: 10px; margin-top: 1px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <button id="xr-btn">Enter VR</button>

  <div id="map-legend">
    <h3>Map Legend</h3>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:10px;height:10px;background:#ff4500;"></span></span>
      <span class="legend-label">Camera</span>
      <button class="legend-toggle" id="legend-cameras-btn" title="Toggle camera markers">&#x1F441;</button>
    </div>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:12px;height:12px;background:#ffa500;"></span></span>
      <span class="legend-label">Near fire (&lt;5 km)</span>
    </div>

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:14px;height:14px;background:#ff0000;"></span></span>
      <span class="legend-label">Inside fire perimeter</span>
    </div>

    <hr class="legend-divider">

    <div class="legend-row" id="fire-legend-row">
      <span class="legend-symbol"><span class="legend-polygon"></span></span>
      <span class="legend-label">Active fire perimeter</span>
      <button class="legend-toggle" id="legend-fires-btn" title="Toggle fire overlay">&#x1F441;</button>
    </div>

    <hr class="legend-divider">

    <div class="legend-row">
      <span class="legend-symbol"><span class="legend-dot" style="width:14px;height:14px;background:#0097A7;"></span></span>
      <span class="legend-label">Public webcam</span>
      <button class="legend-toggle" id="legend-webcams-btn" title="Toggle public webcams">&#x1F441;</button>
    </div>

    <hr class="legend-divider">
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#1565C0;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">PD</span></span>
      <span class="legend-label">Law Enforcement</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#C62828;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">FD</span></span>
      <span class="legend-label">Fire Dispatch</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#2E7D32;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">+</span></span>
      <span class="legend-label">EMS</span>
    </div>
    <div class="legend-row">
      <span class="legend-symbol"><span style="width:18px;height:18px;border-radius:50%;background:#E65100;border:2px solid #fff;display:inline-block;font:bold 8px sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;">MC</span></span>
      <span class="legend-label">Multi-Agency</span>
      <button class="legend-toggle" id="legend-radio-btn" title="Toggle radio markers">&#x1F441;</button>
    </div>
  </div>

  <script type="importmap">
{
  "imports": {
    "cesium": "./cesium-esm-shim.js"
  }
}
</script>
<script type="module">
    import { WebXRWildfireCameraSandbox } from '../dist/WebXRWildfireCameraSandbox.js';
    import { WebXRCesiumBridge } from './webxr-bridge.js';
    import { EmergencyRadioDataSource, EmergencyRadioMarkerManager, EmergencyRadioPlayer } from '../dist/index.js';
    import { PublicWebcamDataSource, PublicWebcamMarkerManager, PublicWebcamViewer } from '../dist/index.js';

    const terrainProvider = await Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(
      'https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer'
    );

    const topoLayer = Cesium.ImageryLayer.fromProviderAsync(
      Cesium.ArcGisMapServerImageryProvider.fromUrl(
        'https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer'
      )
    );

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider,
      baseLayer: topoLayer,
      vrButton: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      animation: false,
      timeline: false,
      infoBox: false,
      geocoder: false,
      homeButton: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
    });

    // Prevent gimbal-lock at exactly -90° pitch (straight down): at that angle
    // Cesium continuously corrects the undefined heading, which fires camera.changed
    // on every frame and prevents the debounce from ever settling.
    viewer.scene.screenSpaceCameraController.minimumPitchAngle = -Cesium.Math.toRadians(89.99);

    const sandbox = new WebXRWildfireCameraSandbox(viewer, {
      dataSource: {
        imageUrlPattern: 'https://cameras.alertcalifornia.org/public-camera-data/{id}/latest-frame.jpg'
      },
      fireOverlay: {
        proximityThresholdKm: 5,
        refreshIntervalMs: 300_000,
        showToggleButton: false,
      },
    });

    sandbox.load('https://cameras.alertcalifornia.org/public-camera-data/all_cameras-v3.json')
      .then(cameras => {
        const overlay = sandbox.fireOverlay;
        if (!overlay) return;
        console.info(`[FireOverlay] status: ${overlay.status}`);
        console.info(`[FireOverlay] ${overlay.incidents.length} active fire incident(s) loaded`);
        buildFireMenu(overlay.incidents);
      })
      .catch(console.error);

    // Emergency Radio
    const radioSource = new EmergencyRadioDataSource({
      // apiKey: 'YOUR_BROADCASTIFY_API_KEY', // get free key at broadcastify.com/api
    });
    const radioPlayer = new EmergencyRadioPlayer(viewer.container);
    const radioMarkers = new EmergencyRadioMarkerManager(viewer, {
      onSelect: (feed) => radioPlayer.open(feed),
    });
    radioSource.load()
      .then(feeds => {
        radioMarkers.setFeeds(feeds);
        console.info(`[Radio] ${feeds.length} emergency radio feeds loaded`);
      })
      .catch(console.error);

    // ── Fire cascade menu ─────────────────────────────────────────────────
    function flyToBBox(bbox, pad = 0.05) {
      viewer.camera.flyTo({
        destination: Cesium.Rectangle.fromDegrees(
          bbox.west  - pad,
          bbox.south - pad,
          bbox.east  + pad,
          bbox.north + pad,
        ),
        duration: 1.5,
      });
    }

    function buildFireMenu(incidents) {
      const fireRow = document.getElementById('fire-legend-row');
      if (!fireRow) return;
      fireRow.querySelector('.fire-cascade')?.remove();
      if (!incidents || incidents.length === 0) return;

      // Group by county. If no county data at all, use a single 'Active Fires' bucket.
      const countyMap = new Map();
      let hasCounty = false;
      for (const inc of incidents) {
        const key = inc.county || null;
        if (key) hasCounty = true;
        const bucket = key ?? 'Active Fires';
        if (!countyMap.has(bucket)) countyMap.set(bucket, []);
        countyMap.get(bucket).push(inc);
      }

      const groups = hasCounty
        ? [...countyMap.entries()].sort((a, b) => a[0].localeCompare(b[0]))
        : [['Active Fires', incidents]];

      const cascade = document.createElement('div');
      cascade.className = 'fire-cascade';

      for (const [groupName, fires] of groups) {
        const countyItem = document.createElement('div');
        countyItem.className = 'fire-county-item';

        const labelSpan = document.createElement('span');
        labelSpan.style.flex = '1';
        labelSpan.textContent = fires.length > 1
          ? `${groupName} (${fires.length})`
          : groupName;
        countyItem.append(labelSpan);

        const arrow = document.createElement('span');
        arrow.className = 'fire-county-arrow';
        arrow.textContent = '›';
        countyItem.append(arrow);

        // Click county → fly to union of all fires in that county
        countyItem.addEventListener('click', (e) => {
          e.stopPropagation();
          flyToBBox({
            west:  Math.min(...fires.map(f => f.boundingBox.west)),
            south: Math.min(...fires.map(f => f.boundingBox.south)),
            east:  Math.max(...fires.map(f => f.boundingBox.east)),
            north: Math.max(...fires.map(f => f.boundingBox.north)),
          });
        });

        // Sub-dropdown: individual fires
        const subDrop = document.createElement('div');
        subDrop.className = 'fire-incidents';

        for (const fire of [...fires].sort((a, b) => a.name.localeCompare(b.name))) {
          const item = document.createElement('div');
          item.className = 'fire-incident-item';

          const nameLine = document.createElement('div');
          nameLine.textContent = fire.name;
          item.append(nameLine);

          const parts = [];
          if (fire.acresBurned  != null) parts.push(`${Math.round(fire.acresBurned).toLocaleString()} ac`);
          if (fire.percentContained != null) parts.push(`${fire.percentContained}% contained`);
          if (parts.length) {
            const meta = document.createElement('div');
            meta.className = 'fire-incident-meta';
            meta.textContent = parts.join(' · ');
            item.append(meta);
          }

          item.addEventListener('click', (e) => {
            e.stopPropagation();
            flyToBBox(fire.boundingBox);
          });
          subDrop.append(item);
        }

        countyItem.append(subDrop);
        cascade.append(countyItem);
      }

      fireRow.append(cascade);

      // Show cascade when hovering symbol or label (not the toggle button).
      // 150 ms grace period lets the mouse cross the gap without hiding.
      const hoverZone = [
        fireRow.querySelector('.legend-symbol'),
        fireRow.querySelector('.legend-label'),
      ];
      let hideTimer;
      const show = () => { clearTimeout(hideTimer); cascade.style.display = 'block'; };
      const hideDelayed = () => {
        hideTimer = setTimeout(() => {
          if (!cascade.matches(':hover') && !cascade.querySelector(':hover')) {
            cascade.style.display = 'none';
          }
        }, 150);
      };
      hoverZone.forEach(el => {
        el?.addEventListener('mouseenter', show);
        el?.addEventListener('mouseleave', hideDelayed);
      });
      cascade.addEventListener('mouseenter', () => clearTimeout(hideTimer));
      cascade.addEventListener('mouseleave', () => { cascade.style.display = 'none'; });
    }
    // ─────────────────────────────────────────────────────────────────────────

    // Legend toggle — cameras
    const camerasBtn = document.getElementById('legend-cameras-btn');
    camerasBtn.addEventListener('click', () => {
      const markers = sandbox.markers;
      markers.setVisible(!markers.visible);
      camerasBtn.classList.toggle('off', !markers.visible);
    });

    // Legend toggle — fire overlay
    const firesBtn = document.getElementById('legend-fires-btn');
    firesBtn.addEventListener('click', () => {
      const overlay = sandbox.fireOverlay;
      if (!overlay) return;
      overlay.setVisible(!overlay.visible);
      firesBtn.classList.toggle('off', !overlay.visible);
    });

    // Public Webcams
    const webcamSource = new PublicWebcamDataSource({
      // apiKey: 'YOUR_WINDY_API_KEY', // free at windy.com/webcams/api
    });
    const webcamViewer  = new PublicWebcamViewer(viewer.container);
    const webcamMarkers = new PublicWebcamMarkerManager(viewer, {
      onSelect: (webcam) => webcamViewer.open(webcam),
    });
    webcamSource.load()
      .then(webcams => {
        webcamMarkers.setWebcams(webcams);
        console.info(`[Webcams] ${webcams.length} public webcams loaded`);
      })
      .catch(console.error);

    // Legend toggle — webcams
    const webcamsBtn = document.getElementById('legend-webcams-btn');
    webcamsBtn.addEventListener('click', () => {
      webcamMarkers.setVisible(!webcamMarkers.visible);
      webcamsBtn.classList.toggle('off', !webcamMarkers.visible);
    });

    // Legend toggle — radio markers
    const radioBtn = document.getElementById('legend-radio-btn');
    radioBtn.addEventListener('click', () => {
      radioMarkers.setVisible(!radioMarkers.visible);
      radioBtn.classList.toggle('off', !radioMarkers.visible);
    });

    // Show the VR button only on devices that support immersive-vr
    const xrBtn = document.getElementById('xr-btn');
    const bridge = new WebXRCesiumBridge(viewer);

    WebXRCesiumBridge.isSupported().then(supported => {
      if (supported) xrBtn.style.display = 'block';
    });

    xrBtn.addEventListener('click', async () => {
      if (bridge.isActive) {
        await bridge.exit();
      } else {
        try {
          await bridge.enter();
          xrBtn.textContent = 'Exit VR';
          xrBtn.classList.add('active');
        } catch (err) {
          console.error('WebXR error:', err);
          alert('Could not enter VR: ' + err.message);
        }
      }
    });

    // Restore button when the session ends (including from the headset side)
    bridge.addEventListener('sessionend', () => {
      xrBtn.textContent = 'Enter VR';
      xrBtn.classList.remove('active');
    });
  </script>
</body>
</html>
